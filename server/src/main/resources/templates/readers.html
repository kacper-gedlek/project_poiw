<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" data-theme="light">
<head>
    <title>CAS</title>
    <meta name="color-scheme" content="light">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css" />
</head>
<body>
    <main class="container">
        <nav>
            <ul>
                <li><header>
                    <h1>Card Authentication System (CAS)</h1>
                </header></li>
            </ul>
            <ul>
                <li><a th:href="@{/}">Home</a></li>
                <li><a th:href="@{/cards}">Cards</a></li>
                <li><a th:href="@{/readers}">Readers</a></li>
            </ul>
        </nav>

        <h2>Reader Management</h2>

        <form th:action="@{/readers/add}" th:object="${newReader}" method="post">
            <div class="grid">
                <label for="readerNumber">
                    Reader Number
                    <input type="text" th:field="*{readerNumber}" id="readerNumber" required />
                    <span th:if="${#fields.hasErrors('readerNumber')}" th:errors="*{readerNumber}"></span>
                </label>
                <label for="requiredAccessLevel">
                    Required Access Level (0-5)
                    <input type="number" th:field="*{requiredAccessLevel}" id="requiredAccessLevel" min="0" max="5" required />
                    <span th:if="${#fields.hasErrors('requiredAccessLevel')}" th:errors="*{requiredAccessLevel}"></span>
                </label>
            </div>
            <button type="submit">Add Reader</button>
        </form>

        <h3>Database</h3>

        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Reader Number</th>
                    <th>Required Access Level</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="reader : ${readers}">
                    <td th:text="${reader.id}"></td>
                    <td th:text="${reader.readerNumber}"></td>
                    <td th:text="${reader.requiredAccessLevel}"></td>
                    <td>
                        <form th:action="@{/readers/delete/{id}(id=${reader.id})}" method="post">
                            <button type="submit" onclick="return confirm('Are you sure you want to delete this reader?');">Remove</button>
                        </form>
                    </td>
                </tr>
            </tbody>
        </table>
    </main>
</body>
</html>
